events {
    worker_connections 1024;
}

http {
    # ログフォーマット（デモ用にどこにルーティングされたか表示）
    log_format routing '$remote_addr - $request - routed to: $upstream_addr';
    access_log /var/log/nginx/access.log routing;

    # アップストリーム定義
    upstream legacy {
        server legacy-tomcat:8080;
    }

    upstream modern {
        server modern-bookstore:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # ============================================================
        # モダナイズされた機能 → Spring Boot (8081)
        # ============================================================
        
        # 書籍検索（モダン版）
        location /book/search {
            proxy_pass http://modern;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # デバッグ用ヘッダー（どこにルーティングされたか確認）
            add_header X-Routed-To "modern-bookstore" always;
        }

        # REST API
        location /api/ {
            proxy_pass http://modern;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            add_header X-Routed-To "modern-bookstore" always;
        }

        # Actuator（ヘルスチェック）
        location /actuator/ {
            proxy_pass http://modern;
            proxy_set_header Host $host;
        }

        # ============================================================
        # レガシー機能 → Tomcat (8080)
        # ============================================================
        
        # それ以外は全部レガシーへ
        location / {
            proxy_pass http://legacy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header X-Routed-To "legacy-tomcat" always;
        }

        # エラーページ
        error_page 502 /502.html;
        location = /502.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
