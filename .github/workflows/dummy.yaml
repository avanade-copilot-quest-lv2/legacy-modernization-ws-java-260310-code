# Deploy Bookstore to Azure VM via Docker Compose
# Trigger: manual (workflow_dispatch) only
#
# Required GitHub Secrets:
#   VM_HOST      — Public IP (or FQDN) of the Azure VM
#   VM_USERNAME  — SSH user (default: azureuser)
#   VM_PASSWORD  — SSH password for the VM
#
# Architecture on the VM:
#   Nginx (:80)  →  Legacy Tomcat (:8080)  /  Modern Spring Boot (:8081)
#                    MySQL 5.7 (:3306) shared database

name: Deploy to Azure VM

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docker stack to VM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Setup: install Docker on VM if needed ──
      - name: Setup Docker on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            if ! command -v docker &> /dev/null; then
              echo "=== Docker not found. Installing... ==="
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
              echo "=== Docker installed ==="
            fi
            docker --version
            docker compose version

      # ── 2. Clone or pull the repository ──
      - name: Clone / update repository on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script_stop: true
          command_timeout: 5m
          script: |
            REPO_DIR="$HOME/legacy-modernization"
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ -d "$REPO_DIR/.git" ]; then
              echo "=== Updating existing repository ==="
              cd "$REPO_DIR"
              git fetch origin
              git checkout "$BRANCH"
              git reset --hard "origin/$BRANCH"
            else
              echo "=== Cloning repository ==="
              git clone --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            fi

      # ── 3. Build and deploy with Docker Compose ──
      - name: Docker Compose up
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd "$HOME/legacy-modernization/infra/docker"

            echo "=== Stopping existing containers (if any) ==="
            docker compose down --remove-orphans || true

            echo "=== Building and starting services ==="
            docker compose up -d --build

            echo "=== Waiting for services to start ==="
            sleep 10
            docker compose ps

      # ── 4. Health check ──
      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script_stop: false
          command_timeout: 3m
          script: |
            echo "=== Container status ==="
            cd "$HOME/legacy-modernization/infra/docker"
            docker compose ps

            echo ""
            echo "=== Health checks ==="

            # Wait for services to become healthy
            for i in $(seq 1 12); do
              echo "Attempt $i/12..."

              # Check MySQL
              if docker exec legacy-mysql mysqladmin ping -h localhost -u root -proot 2>/dev/null; then
                echo "  ✓ MySQL is ready"
              else
                echo "  ✗ MySQL not ready yet"
                sleep 10
                continue
              fi

              # Check Legacy Tomcat
              if curl -sf http://localhost:8080/legacy-app/ > /dev/null 2>&1; then
                echo "  ✓ Legacy Tomcat is ready"
              else
                echo "  ✗ Legacy Tomcat not ready yet"
                sleep 10
                continue
              fi

              # Check Modern Bookstore
              if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
                echo "  ✓ Modern Bookstore is ready"
              else
                echo "  ✗ Modern Bookstore not ready yet"
                sleep 10
                continue
              fi

              # Check Nginx
              if curl -sf http://localhost/ > /dev/null 2>&1; then
                echo "  ✓ Nginx is ready"
              else
                echo "  ✗ Nginx not ready yet"
                sleep 10
                continue
              fi

              echo ""
              echo "=== All services are healthy! ==="
              echo "Access the application at: http://${{ secrets.VM_HOST }}/"
              exit 0
            done

            echo ""
            echo "=== Some services may not be fully ready ==="
            echo "Check logs with: docker compose -f ~/legacy-modernization/infra/docker/docker-compose.yml logs"
            exit 1
