services:
  # =============================================================
  # LEGACY: Tomcat 6.0 with JRE 7 for Struts 1.x compatibility
  # URL: http://localhost:8080/bookstore/book/search.do
  # =============================================================
  tomcat:
    image: tomcat:6.0-jre7
    container_name: legacy-tomcat
    ports:
      - "8080:8080"
    volumes:
      - ../dist:/usr/local/tomcat/webapps
      - ../config:/usr/local/tomcat/conf/Catalina/localhost
    environment:
      - CATALINA_OPTS=-Xms256m -Xmx512m
      - JAVA_OPTS=-Djava.awt.headless=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - legacy-network

  # =============================================================
  # MODERN: Spring Boot 3 + Java 21 (ÅæÉąī¤Ź§ŗ@ö\)
  # URL: http://localhost:8081/book/search
  # API: http://localhost:8081/api/books/search
  # =============================================================
  modern-bookstore:
    build:
      context: ../modern-bookstore
      dockerfile: Dockerfile
    container_name: modern-bookstore
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://legacy-mysql:3306/legacy_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
      - SPRING_DATASOURCE_USERNAME=legacy_user
      - SPRING_DATASOURCE_PASSWORD=legacy_pass
      - TZ=Asia/Tokyo
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - legacy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================
  # MySQL 5.7 for legacy compatibility (shared database)
  # =============================================================
  mysql:
    image: mysql:5.7
    container_name: legacy-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=legacy_db
      - MYSQL_USER=legacy_user
      - MYSQL_PASSWORD=legacy_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ../config/mysql:/docker-entrypoint-initdb.d
    networks:
      - legacy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.1
    container_name: legacy-phpmyadmin
    ports:
      - "8082:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - legacy-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  legacy-network:
    driver: bridge
