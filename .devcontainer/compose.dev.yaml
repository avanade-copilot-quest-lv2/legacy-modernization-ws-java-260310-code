services:
  java5-dev:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mysql
      - tomcat
      - phpmyadmin
    volumes:
      # プロジェクトファイルのマウント
      - ..:/app:cached
      # Maven/Gradleキャッシュディレクトリ（将来的な使用のため）
      - maven-cache:/home/javauser/.m2
      # Antライブラリキャッシュ
      - ant-cache:/home/javauser/.ant
    environment:
      - TZ=Asia/Tokyo
      - LANG=ja_JP.UTF-8
      - LANGUAGE=ja_JP:ja
      - LC_ALL=C.UTF-8
      # Java デバッグ設定
      - JAVA_OPTS=-Xdebug -Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=9000
    command: tail -f /dev/null
    # ヘルスチェック
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Tomcat 6.0 with JRE 7 for Struts 1.x compatibility
  tomcat:
    image: tomcat:6.0-jre7
    ports:
      - "8080:8080"
    volumes:
      - ../dist:/usr/local/tomcat/webapps
      - ../config:/usr/local/tomcat/conf/Catalina/localhost
    environment:
      - CATALINA_OPTS=-Xms256m -Xmx512m
      - JAVA_OPTS=-Djava.awt.headless=true

  # MySQL 5.7 for legacy compatibility
  mysql:
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=legacy_db
      - MYSQL_USER=legacy_user
      - MYSQL_PASSWORD=legacy_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ../config/mysql:/docker-entrypoint-initdb.d
    networks:
      default:
        aliases:
          - legacy-mysql

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.1
    ports:
      - "8082:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  maven-cache:
    driver: local
  ant-cache:
    driver: local
  mysql_data:
    driver: local
